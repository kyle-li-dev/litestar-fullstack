# git-cliff configuration
# https://git-cliff.org/docs/configuration

[changelog]
# changelog header
header = """---
icon: material/timeline-text
---

# 📋 Changelog

All notable changes to this project will be documented in this file.

The format is based on [Conventional Commits](https://www.conventionalcommits.org),
and this project adheres to [Semantic Versioning](https://semver.org).

"""
# template for the changelog body
# https://keats.github.io/tera/docs/#introduction
body = """
{%- macro remote_url() -%}
  https://github.com/kyle-li-dev/litestar-fullstack
{%- endmacro -%}

{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}]{% if release_link %}({{ release_link }}){% endif %} — {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim }}

{% for commit in commits
| filter(attribute="scope")
| sort(attribute="scope") %}
- **{{ commit.scope }}**: {{ commit.message }}{% if commit.breaking %} 💥{% endif %}\
  {% if commit.body %}\n{{ commit.body | indent(prefix="  ") }}{% endif %}\
  ([`{{ commit.id | truncate(length=7, end="") }}`]({{ self::remote_url() }}/commit/{{ commit.id }}))
{%- endfor -%}

{% for commit in commits %}
{%- if not commit.scope %}
- {{ commit.message }}{% if commit.breaking %} 💥{% endif %}\
  {% if commit.body %}\n{{ commit.body | indent(prefix="  ") }}{% endif %}\
  ([`{{ commit.id | truncate(length=7, end="") }}`]({{ self::remote_url() }}/commit/{{ commit.id }}))
{% endif -%}
{%- endfor %}
{% endfor %}

{%- if github.contributors | filter(attribute="is_first_time", value=true) | length != 0 %}
### 🌟 New Contributors

{% for contributor in github.contributors | filter(attribute="is_first_time", value=true) %}
- @{{ contributor.username }} made their first contribution
  {%- if contributor.pr_number %} in [#{{ contributor.pr_number }}]({{ self::remote_url() }}/pull/{{ contributor.pr_number }}){% endif %}
{%- endfor %}
{% endif -%}

"""
# template for the changelog footer
footer = """
---

*Generated by [git-cliff](https://git-cliff.org/) · [Conventional Commits](https://conventionalcommits.org)*
"""
# remove the leading and trailing whitespace from the templates
trim = true
# postprocessors
postprocessors = [
  { pattern = '<REPO>', replace = "https://github.com/kyle-li-dev/litestar-fullstack" },
]

[git]
# parse the commits based on https://www.conventionalcommits.org
conventional_commits = true
# filter out the commits that are not conventional
filter_unconventional = false
# process each line of a commit as an individual commit
split_commits = false
# regex for preprocessing the commit messages
commit_preprocessors = [
  # Replace issue numbers
  { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](https://github.com/kyle-li-dev/litestar-fullstack/issues/${2}))" },
]
# regex for parsing and grouping commits
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->✨ Features" },
  { message = "^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->⚡ Performance" },
  { message = "^refactor", group = "<!-- 3 -->♻️ Refactoring" },
  { message = "^docs", group = "<!-- 4 -->📖 Documentation" },
  { message = "^style", group = "<!-- 5 -->🎨 Styling" },
  { message = "^test", group = "<!-- 6 -->🧪 Testing" },
  { message = "^build", group = "<!-- 7 -->📦 Build System" },
  { message = "^ci", group = "<!-- 8 -->🔧 CI/CD" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore\\(deps\\)", skip = true },
  { message = "^chore\\(pr\\)", skip = true },
  { message = "^chore\\(pull\\)", skip = true },
  { message = "^chore|^ci", group = "<!-- 9 -->🔨 Miscellaneous" },
  { message = "^revert", group = "<!-- 10 -->⏪ Reverts" },
  { body = ".*security", group = "<!-- 11 -->🔒 Security" },
  { message = "^Bump version", skip = true },
  # Catch-all for non-conventional commits
  { message = ".*", group = "<!-- 12 -->📝 Other Changes" },
]
# protect breaking changes from being skipped due to matching a skipping commit_parser
protect_breaking_commits = true
# filter out the commits that are not matched by commit parsers
filter_commits = false
# regex for matching git tags
tag_pattern = "v[0-9].*"
# regex for skipping tags
skip_tags = "beta|alpha"
# regex for ignoring tags
ignore_tags = "rc"
# sort the tags topologically
topo_order = false
# sort the commits inside sections by oldest/newest order
sort_commits = "newest"